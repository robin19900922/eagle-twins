        }
        
        setInterval(() => {
            if (currentReadIndex >= 70) currentReadIndex = 48;
            
            monitoringIndicators.forEach(csvName => {
                const data = monitoringData[csvName];
                if (data && data[currentReadIndex] !== undefined) {
                    const ind = indicatorData.find(i => i.csvName === csvName);
                    if (ind) {
                        indicatorValues[ind.id] = data[currentReadIndex];
                        document.getElementById(`value-${ind.id}`).value = data[currentReadIndex].toFixed(1);
                        checkIndicatorStatus(ind.id);
                    }
                }
            });
            
            updateOrganColors();
            currentReadIndex++;
        }, 10000);

        document.getElementById('trend-btn').onclick = () => {
            const modal = document.getElementById('trend-modal');
            modal.classList.add('show');
            renderTrendCharts();
        };
        
        document.getElementById('close-trend').onclick = () => {
            document.getElementById('trend-modal').classList.remove('show');
        };
        
        document.getElementById('trend-modal').onclick = (e) => {
            if (e.target.id === 'trend-modal') {
                document.getElementById('trend-modal').classList.remove('show');
            }
        };
        
        function renderTrendCharts() {
            const container = document.getElementById('trend-charts');
            container.innerHTML = '';
            
            const now = new Date();
            const timeLabels = [];
            for (let i = 47; i >= 0; i--) {
                const t = new Date(now.getTime() - i * 30 * 60 * 1000);
                timeLabels.push(`${String(t.getMonth() + 1).padStart(2, '0')}-${String(t.getDate()).padStart(2, '0')} ${String(t.getHours()).padStart(2, '0')}:${String(t.getMinutes()).padStart(2, '0')}`);
            }
            
            monitoringIndicators.forEach(csvName => {
                const data = monitoringData[csvName];
                if (!data) return;
                
                const ind = indicatorData.find(i => i.csvName === csvName);
                if (!ind) return;
                
                const chartDiv = document.createElement('div');
                chartDiv.className = 'trend-chart-container';
                chartDiv.innerHTML = `
                    <div class="trend-chart-title">${ind.name}</div>
                    <canvas class="trend-chart" id="chart-${ind.id}" style="width:100%;height:140px;"></canvas>
                `;
                container.appendChild(chartDiv);
                
                const canvas = chartDiv.querySelector('canvas');
                const ctx = canvas.getContext('2d');
                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';
                
                const chartData = data.slice(0, 48);
                const rect = canvas.getBoundingClientRect();
                canvas.width = rect.width;
                canvas.height = rect.height;
                const width = canvas.width;
                const height = canvas.height;
                const padding = { top: 15, right: 15, bottom: 30, left: 45 };
                const chartWidth = width - padding.left - padding.right;
                const chartHeight = height - padding.top - padding.bottom;
                
                const dataMin = Math.min(...chartData);
                const dataMax = Math.max(...chartData);
                const rangeMin = Math.min(dataMin, ind.min);
                const rangeMax = Math.max(dataMax, ind.max);
                const padding2 = (rangeMax - rangeMin) * 0.15;
                const minVal = rangeMin - padding2;
                const maxVal = rangeMax + padding2;
                
                ctx.clearRect(0, 0, width, height);
                
                ctx.strokeStyle = 'rgba(80, 120, 160, 0.3)';
                ctx.lineWidth = 1;
                ctx.setLineDash([5, 5]);
                const normalHighY = padding.top + chartHeight - ((ind.max - minVal) / (maxVal - minVal)) * chartHeight;
                const normalLowY = padding.top + chartHeight - ((ind.min - minVal) / (maxVal - minVal)) * chartHeight;
                ctx.beginPath();
                ctx.moveTo(padding.left, normalHighY);
                ctx.lineTo(width - padding.right, normalHighY);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(padding.left, normalLowY);
                ctx.lineTo(width - padding.right, normalLowY);
                ctx.stroke();
                ctx.setLineDash([]);
                
                ctx.fillStyle = 'rgba(100, 200, 150, 0.6)';
                ctx.font = '10px "Segoe UI", Arial';
                ctx.fillText(`上限: ${ind.max}`, padding.left + 5, normalHighY - 5);
                ctx.fillText(`下限: ${ind.min}`, padding.left + 5, normalLowY + 12);
                
                const gradient = ctx.createLinearGradient(padding.left, 0, width - padding.right, 0);
                gradient.addColorStop(0, 'rgba(0, 150, 255, 0.3)');
                gradient.addColorStop(0.5, 'rgba(0, 200, 255, 0.4)');
                gradient.addColorStop(1, 'rgba(0, 150, 255, 0.3)');
                
                ctx.beginPath();
                chartData.forEach((val, i) => {
                    const x = padding.left + (i / 47) * chartWidth;
                    const y = padding.top + chartHeight - ((val - minVal) / (maxVal - minVal)) * chartHeight;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                });
                ctx.strokeStyle = 'rgba(0, 180, 255, 0.8)';
                ctx.lineWidth = 2.5;
                ctx.shadowColor = 'rgba(0, 200, 255, 0.6)';
                ctx.shadowBlur = 8;
                ctx.stroke();
                ctx.shadowBlur = 0;
                
                chartData.forEach((val, i) => {
                    const x = padding.left + (i / 47) * chartWidth;
                    const y = padding.top + chartHeight - ((val - minVal) / (maxVal - minVal)) * chartHeight;
                    
                    if (i === chartData.length - 1) {
                        ctx.beginPath();
                        ctx.arc(x, y, 5, 0, Math.PI * 2);
                        ctx.fillStyle = 'rgba(0, 255, 200, 0.9)';
                        ctx.shadowColor = 'rgba(0, 255, 200, 0.8)';
                        ctx.shadowBlur = 15;
                        ctx.fill();
                        ctx.shadowBlur = 0;
                        
                        ctx.beginPath();
                        ctx.arc(x, y, 3, 0, Math.PI * 2);
                        ctx.fillStyle = '#ffffff';
                        ctx.fill();
                    } else if (i % 8 === 0) {
                        ctx.beginPath();
                        ctx.arc(x, y, 2.5, 0, Math.PI * 2);
                        ctx.fillStyle = 'rgba(0, 180, 255, 0.7)';
                        ctx.fill();
                    }
                });
                
                ctx.strokeStyle = 'rgba(80, 120, 160, 0.5)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(padding.left, padding.top);
                ctx.lineTo(padding.left, height - padding.bottom);
                ctx.lineTo(width - padding.right, height - padding.bottom);
                ctx.stroke();
                
                ctx.fillStyle = 'rgba(120, 160, 200, 0.8)';
                ctx.font = '10px "Segoe UI", Arial';
                ctx.textAlign = 'right';
                const yTicks = 5;
                for (let i = 0; i <= yTicks; i++) {
                    const val = minVal + (maxVal - minVal) * (yTicks - i) / yTicks;
                    const y = padding.top + (i / yTicks) * chartHeight;
                    ctx.fillText(val.toFixed(1), padding.left - 8, y + 4);
                }
                
                ctx.textAlign = 'center';
                const xTicks = 6;
                for (let i = 0; i <= xTicks; i++) {
                    const idx = Math.round(i * 47 / xTicks);
                    const x = padding.left + (idx / 47) * chartWidth;
                    ctx.fillText(timeLabels[idx], x, height - padding.bottom + 18);
                }
            });
        }
        
        const loader = new GLTFLoader();
        
        loader.load(
            './260313-人体结构.glb',
            (gltf) => {
                const object = gltf.scene;
                let index = 1;
                
                object.traverse((child) => {
                    if (child.isMesh) {
                        const keepIndex = keepRanges.indexOf(index) !== -1;
                        const isBodyShell = index === 54;
                        const baseColor = organColors[index] || organColor;
                        const color = isBodyShell ? bodyColor : (keepIndex ? baseColor : bodyColor);
                        const opacity = isBodyShell ? 0.15 : (keepIndex ? 0.5 : 0.15);
                        const emissiveInt = 0.2;
                        
                        child.material = new THREE.MeshPhysicalMaterial({ 
                            color: color,
                            emissive: color,
                            emissiveIntensity: emissiveInt,
                            metalness: 0.2,
                            roughness: 0.4,
                            transparent: true,
                            opacity: opacity,
                            side: THREE.DoubleSide,
                            transmission: isBodyShell ? 0.85 : 0.3,
                            thickness: isBodyShell ? 0.1 : 0.3,
                            depthWrite: !isBodyShell
                        });
                        
                        const shouldVisible = keepRanges.includes(index) || index === 54;
                        child.visible = shouldVisible;
                        
                        child.userData.orgIndex = index;
                        
                        if (index === 26) {
                            const box = new THREE.Box3().setFromObject(child);
                            heartPosition = box.getCenter(new THREE.Vector3());
                        }
                        
                        organMeshes.push({ 
                            mesh: child, 
                            index: index, 
                            name: child.name || '部件' + index,
                            visible: shouldVisible
                        });
                        index++;
                    }
                });
                
                const box = new THREE.Box3().setFromObject(object);
                const size = box.getSize(new THREE.Vector3());
                const maxSize = Math.max(size.x, size.y, size.z);
                object.scale.setScalar(8 / maxSize);
                
                const center = box.getCenter(new THREE.Vector3());
                object.position.x = -center.x * (8 / maxSize);
                object.position.y = -center.y * (8 / maxSize);
                object.position.z = -center.z * (8 / maxSize);
                
                if (heartPosition) {
                    heartPosition.x = heartPosition.x * (8 / maxSize) - center.x * (8 / maxSize);
                    heartPosition.y = heartPosition.y * (8 / maxSize) - center.y * (8 / maxSize);
                    heartPosition.z = heartPosition.z * (8 / maxSize) - center.z * (8 / maxSize);
                }
                
                scene.add(object);
                
                loadHeartModel();
            },
            (xhr) => { console.log((xhr.loaded / xhr.total * 100) + '%'); },
            (error) => { console.error(error); document.getElementById('loading').textContent = '加载失败'; }
        );

        function createControls() {
            const list = document.getElementById('organ-list');
            list.innerHTML = '';
            
            const btn = document.getElementById('toggle-panel-btn');
            btn.onclick = () => {
                const panel = document.getElementById('controls');
                const isHidden = panel.style.display === 'none';
                panel.style.display = isHidden ? 'block' : 'none';
                btn.textContent = isHidden ? '隐藏面板' : '显示面板';
            };
            
            const heartDiv = document.createElement('div');
            heartDiv.className = 'organ-toggle';
            heartDiv.innerHTML = `<input type="checkbox" id="toggle-heart" checked><span>0: Heart - 心脏</span>`;
            list.appendChild(heartDiv);
            
            document.getElementById('toggle-heart').onchange = (e) => {
                if (heartMesh) heartMesh.visible = e.target.checked;
            };
            
            organMeshes.forEach((organ) => {
                const organInfo = organNames[organ.index] || { en: 'Unknown', cn: '未知' };
                const div = document.createElement('div');
                div.className = 'organ-toggle';
                const checked = organ.mesh.visible ? 'checked' : '';
                div.innerHTML = `<input type="checkbox" id="toggle-${organ.index}" ${checked}><span>${organ.index}: ${organInfo.en} - ${organInfo.cn}</span>`;
                list.appendChild(div);
                
                document.getElementById('toggle-' + organ.index).onchange = (e) => {
                    organ.mesh.visible = e.target.checked;
                };
            });
        }
        
        function loadHeartModel() {
            loader.load(
                './glb/心脏.glb',
                (gltf) => {
                    const object = gltf.scene;
                    
                    object.traverse((child) => {
                        if (child.isMesh) {
                            child.material = new THREE.MeshPhysicalMaterial({ 
                                color: organColor,
                                emissive: organColor,
                                emissiveIntensity: 0.2,
                                metalness: 0.2,
                                roughness: 0.4,
                                transparent: true,
                                opacity: 0.5,
                                side: THREE.DoubleSide
                            });
                        }
                    });
                    
                    const box = new THREE.Box3().setFromObject(object);
                    const size = box.getSize(new THREE.Vector3());
                    const maxSize = Math.max(size.x, size.y, size.z);
                    const scale = 0.75 / maxSize;
                    object.scale.setScalar(scale);
                    heartBaseScale = scale;
                    
                    if (heartPosition) {
                        object.position.copy(heartPosition);
                        object.position.z += 0.2;
                    } else {
                        object.position.set(0, 2, 0.2);
                    }
                    
                    heartMesh = object;
                    scene.add(object);
                    
                    createControls();
                    document.getElementById('loading').style.display = 'none';
                },
                undefined,
                (error) => {
                    console.error('Error loading heart model:', error);
                    createControls();
                    document.getElementById('loading').style.display = 'none';
                }
            );
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            
            if (heartMesh) {
                const time = Date.now() * 0.001;
                const currentHR = indicatorValues['HR'] || 75;
                const heartHz = currentHR / 60;
                const scale = heartBaseScale * (1 + Math.sin(time * heartHz * Math.PI * 2) * 0.08);
                heartMesh.scale.setScalar(scale);
            }
            
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
